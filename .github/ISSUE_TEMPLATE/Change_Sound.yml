name: "[사운드 변경]"
description: DTS의 변경할 사운드 파일이 있으시나요?
title: "[사운드변경]"
labels: Change Sound
body:
  - type: markdown
    attributes:
      value: |
        변경사항을 추가해주셔서 감사합니다!
  - type: textarea
    attributes:
      label: 깃허브 자료실 사운드 파일명
      description: 깃허브 자료실내 사운드 파일명을 명시해주세요. 이슈적용시 혼란을 막기 위함입니다. 번거롭더라도 협조부탁드립니다.
    validations:
      required: true
  - type: textarea
    attributes:
      label: 설명
      description: 설명사항을 적어주세요.
  - type: textarea
    attributes:
      label: 적용될 열차 목록
      description: 적용될 사운드 열차 파일을 명시해주세요.
    validations:
      required: true